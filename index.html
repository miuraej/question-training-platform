<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ME・臨床工学 過去問トレーニング</title>
    <link rel="stylesheet" href="styles.css?v=20260713-admin-edit" />
  </head>
  <body>
    <header class="app-header">
      <div>
        <p class="eyebrow">ME / Clinical Engineer Exam Practice</p>
        <h1>ME・臨床工学 過去問トレーニング</h1>
      </div>
      <div class="summary" aria-label="学習状況">
        <span><strong id="doneCount">0</strong> 完了</span>
        <span><strong id="accuracy">0%</strong> 正答率</span>
        <button id="adminModeToggle" class="admin-mode-toggle" type="button" aria-pressed="false">管理者モード OFF</button>
      </div>
    </header>

    <main class="layout">
      <aside class="panel controls" aria-label="検索条件">
        <button class="mobile-panel-toggle" type="button" data-mobile-toggle="sectionBuilder" aria-expanded="false">問題設定を開く</button>
        <div id="sectionBuilder" class="section-builder mobile-collapsible" aria-label="出題設定">
          <div class="section-builder-head">
            <strong>出題設定</strong>
          </div>
          <div class="csv-tools collapsed" id="questionIdCsvTools">
            <div class="csv-tools-head">
              <strong>CSV指定</strong>
              <button id="toggleQuestionIdCsvButton" class="ghost-button icon-button" type="button" aria-expanded="false">開く</button>
            </div>
            <div class="csv-tools-body" hidden>
              <div class="csv-field">
                <div class="csv-field-head">
                  <label for="questionIdCsvInput">問題ID</label>
                  <button id="updateQuestionIdCsvButton" class="ghost-button csv-update-button" type="button">更新</button>
                </div>
                <textarea id="questionIdCsvInput" rows="3" placeholder="例: 2me_42_a_03, 2me_43_a_25"></textarea>
              </div>
              <button id="clearQuestionIdCsvButton" class="ghost-button csv-clear-button" type="button">CSV指定をクリア</button>
            </div>
          </div>
          <div class="preset-tools" aria-label="出題設定の保存">
            <div class="preset-save-row">
              <label>
                設定名
                <input id="presetNameInput" type="text" placeholder="例: ME2種の10トライアル" />
              </label>
              <button id="savePresetButton" class="ghost-button" type="button">保存</button>
            </div>
            <div class="preset-load-group">
              <label>
                保存した設定
                <select id="presetSelect" aria-label="保存した設定">
                  <option value="">保存した設定</option>
                </select>
              </label>
              <div class="preset-actions">
                <button id="loadPresetButton" class="ghost-button" type="button">この設定で更新</button>
                <button id="deletePresetButton" class="ghost-button" type="button">削除</button>
              </div>
            </div>
          </div>
          <div id="sectionList" class="section-list"></div>
          <button id="addSectionButton" class="ghost-button add-section-button" type="button">セクションを追加</button>
          <button id="sectionStartButton" class="primary-button" type="button">更新</button>
        </div>

        <label class="status-control">
          状態
          <select id="statusSelect">
            <option value="all">すべて</option>
            <option value="unsolved">未学習</option>
            <option value="correct">正解</option>
            <option value="review">復習</option>
          </select>
        </label>

        <label class="check-control">
          <input id="shuffleChoices" type="checkbox" checked />
          選択肢をシャッフル
        </label>

        <label class="check-control">
          <input id="shuffleQuestions" type="checkbox" checked />
          問題をシャッフル
        </label>

        <label class="exam-name-control">
          試験名
          <input id="examNameInput" type="text" placeholder="例: 第43回 午前 模擬" />
        </label>

        <label class="exam-minutes-control">
          制限時間（分）
          <input id="examMinutes" type="number" min="0" step="1" placeholder="例: 60" />
        </label>

        <button class="mobile-panel-toggle" type="button" data-mobile-toggle="learningDataPanel" aria-expanded="false">学習データを開く</button>
        <div id="learningDataPanel" class="learning-data-panel mobile-collapsible">
          <div class="data-export" aria-label="学習データ出力">
            <strong>学習データ</strong>
            <div class="data-export-actions">
              <button id="exportProgressJsonButton" class="ghost-button" type="button">JSON</button>
              <button id="exportProgressCsvButton" class="ghost-button" type="button">CSV</button>
              <button id="exportProgressTextButton" class="ghost-button" type="button">テキスト</button>
              <button id="showProgressReportButton" class="ghost-button" type="button">結果表示</button>
              <button id="exportExplanationsButton" class="ghost-button" type="button">解説JSON</button>
              <button id="importExplanationsButton" class="ghost-button" type="button">解説取込</button>
            </div>
            <input id="importExplanationsFile" type="file" accept="application/json,.json" hidden />
          </div>
          <button id="resetButton" class="ghost-button" type="button">記録をリセット</button>
        </div>

        <div class="print-options" aria-label="印刷設定">
          <strong>印刷に含める内容</strong>
          <label class="check-control">
            <input id="printIncludeFilters" type="checkbox" checked />
            問題情報
          </label>
          <label class="check-control">
            <input id="printIncludeStatus" type="checkbox" checked />
            状態
          </label>
          <label class="check-control">
            <input id="printIncludeAnswer" type="checkbox" />
            正解
          </label>
          <label class="print-size-control">
            <span>図の大きさ</span>
            <select id="printImageSize">
              <option value="standard">標準</option>
              <option value="small">小</option>
              <option value="large">大</option>
            </select>
          </label>
          <button id="printButton" class="ghost-button" type="button">印刷</button>
        </div>
      </aside>

      <section class="study-area" aria-label="過去問一覧">
        <div class="toolbar">
          <div>
            <h2 id="resultTitle">今回の出題</h2>
            <p id="resultCount">0問</p>
            <p id="printSummary" class="print-summary"></p>
          </div>
          <div class="toolbar-actions">
            <span id="examTimer" class="exam-timer" aria-live="polite"></span>
            <button id="pauseExamButton" class="ghost-button exam-control" type="button" hidden>中断</button>
            <button id="stopExamButton" class="ghost-button exam-control" type="button" hidden>終了して結果を見る</button>
            <button id="newSetButton" class="primary-button" type="button">試験開始</button>
          </div>
        </div>
        <div id="examSummary" class="exam-summary-panel" hidden></div>
        <div id="questionList" class="question-list"></div>
        <button id="stopExamBottomButton" class="ghost-button exam-control exam-bottom-control" type="button" hidden>終了して結果を見る</button>
      </section>
    </main>

    <template id="questionTemplate">
      <article class="question-card">
        <div class="question-meta"></div>
        <h3></h3>
        <p class="question-text"></p>
        <div class="question-images"></div>
        <ol class="choices"></ol>
        <form class="answer-form">
          <label>
            あなたの回答
            <input class="answer-input" type="text" placeholder="答えを入力" autocomplete="off" />
          </label>
          <button class="check-answer" type="submit">判定</button>
        </form>
        <p class="feedback" aria-live="polite"></p>
        <div class="answer-box" hidden></div>
        <div class="card-actions">
          <button class="show-answer" type="button">解答を見る</button>
          <button class="mark-correct" type="button">正解</button>
          <button class="mark-review" type="button">復習</button>
          <button class="retry-question" type="button">もう1回</button>
        </div>
      </article>
    </template>

    <script src="data/academic-categories.js?v=20260714-phase2-academic"></script>
    <script src="data/questions-me2.js?v=20260706-me2-40-q30-italic"></script>
    <script src="app.js?v=20260713-admin-edit-export-confirm"></script>
  </body>
</html>
